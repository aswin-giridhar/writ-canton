                - paragraph [ref=f3e213]:
                  - text: This guide walks you through the entire Seaport workflow from getting your DevNet wallet and setting up the Daml SDK, to writing, building, deploying, and exercising contracts on the 5N Seaport shared
                  - code [ref=f3e214]: 5n sandbox
                  - text: validator.
