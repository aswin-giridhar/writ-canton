                    - text: and
                    - strong [ref=f3e335]: Create organization
                    - text: buttons
                - paragraph [ref=f3e336]: Click an item to switch. The whole app re-scopes to that mode — your project list, the validators you can deploy to, and the members you can invite all change.
                - blockquote [ref=f3e337]:
                  - paragraph [ref=f3e338]:
                    - strong [ref=f3e339]: Tip — tabs are scoped.
                    - text: A project opened in a tab stays in whichever mode (Personal or a specific org) you opened it from. Switching the org switcher in the top bar does
