                    - /url: "#who-is-this-guide-for"
                - paragraph [ref=f3e220]: "This guide is for new users getting started with Seaport. Before you create, build, or deploy anything, it's important to understand how access works: Seaport supports both personal and organization modes, and your current URL determines which mode you're using."
                - generic [ref=f3e221]:
